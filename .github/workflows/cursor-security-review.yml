# =============================================================================
# Cursor CLI — security-focused PR review (GitHub Actions)
#
# This uses the official Cursor headless agent pattern:
#   https://cursor.com/docs/cli/github-actions
#
# Tangible outputs: (1) uploaded pr-diff.patch / pr-diff-stat.txt artifact,
# (2) job summary with diff mode, (3) agent log in the job output.
#
# If origin/base...HEAD is empty (e.g. main vs main), the workflow falls back to
# the last commit patch so the agent still has real hunks to review.
#
# Push to main/develop: diff uses github.event.before..after so a merge to your
# fork's main produces a tangible patch without opening a PR.
#
# See .github/CURSOR_VS_SNYK.md for how this differs from Snyk.
#
# Setup: Settings → Secrets and variables → Actions → add CURSOR_API_KEY
# =============================================================================
name: Cursor Security Review

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Compare the selected branch to this base (e.g. main). Use a feature branch as the workflow branch."
        required: false
        default: "main"

concurrency:
  group: cursor-security-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  cursor-security-review:
    name: Cursor agent (security review)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Build diff for the agent
        id: diff
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_branch }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          echo "## Cursor Security Review — diff context" >> "$GITHUB_STEP_SUMMARY"
          echo "- **event:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HEAD (SHA):** $(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HEAD branch:** ${HEAD_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base ref:** ${BASE_REF}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            echo "- **push before:** ${BEFORE}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **push after:** ${AFTER}" >> "$GITHUB_STEP_SUMMARY"
            MODE="push_before_after"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git show -p --no-color --pretty=medium "${AFTER}" > pr-diff.patch || true
              git show --stat --no-patch "${AFTER}" > pr-diff-stat.txt 2>/dev/null || git show --stat "${AFTER}" > pr-diff-stat.txt || true
              MODE="push_initial_commit"
            else
              git diff "${BEFORE}" "${AFTER}" > pr-diff.patch || true
              git diff "${BEFORE}" "${AFTER}" --stat > pr-diff-stat.txt || true
            fi
            if [ ! -s pr-diff.patch ]; then
              echo "::notice::Push-range diff empty; falling back to HEAD~1..HEAD."
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                git diff HEAD~1..HEAD > pr-diff.patch
                git diff HEAD~1..HEAD --stat > pr-diff-stat.txt
                MODE="push_fallback_parent_to_head"
              else
                git show -p --no-color --pretty=medium HEAD > pr-diff.patch
                git show --stat --no-patch HEAD > pr-diff-stat.txt || git show --stat HEAD > pr-diff-stat.txt
                MODE="push_fallback_single_commit_show"
              fi
            fi
          else
            git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            git fetch origin "${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}" || {
              echo "::warning::Could not fetch origin/${HEAD_BRANCH}. Push the branch to origin, then re-run."
            }

            echo "### Commits on HEAD not in origin/${BASE_REF} (first 20)" >> "$GITHUB_STEP_SUMMARY"
            git log --oneline "origin/${BASE_REF}..HEAD" | head -20 >> "$GITHUB_STEP_SUMMARY" || true

            MODE="pr_three_dot"
            git diff "origin/${BASE_REF}...HEAD" > pr-diff.patch || true
            git diff "origin/${BASE_REF}...HEAD" --stat > pr-diff-stat.txt || true

            if [ ! -s pr-diff.patch ]; then
              echo "::notice::Three-dot diff empty (HEAD matches merge-base with origin/${BASE_REF}, or same commit). Trying fallbacks so the agent still has hunks."
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                git diff HEAD~1..HEAD > pr-diff.patch
                git diff HEAD~1..HEAD --stat > pr-diff-stat.txt
                MODE="parent_to_head"
              else
                git show -p --no-color --pretty=medium HEAD > pr-diff.patch
                git show --stat --no-patch HEAD > pr-diff-stat.txt || git show --stat HEAD > pr-diff-stat.txt
                MODE="single_commit_show"
              fi
            fi
          fi

          if [ ! -s pr-diff.patch ]; then
            printf '%s\n' "--- /dev/null" "+++ b/.github/cursor-security-review-fallback.txt" "@@ -0,0 +1,3 @@" "+No git diff could be generated (empty repo or checkout issue)." "+Re-run from a branch with commits, or open a PR with real changes." "+See workflow logs for fetch/diff diagnostics." > pr-diff.patch
            printf '%s\n' " .github/cursor-security-review-fallback.txt | 3 +" > pr-diff-stat.txt
            MODE="placeholder"
          fi

          BYTES=$(wc -c < pr-diff.patch | tr -d ' ')
          echo "bytes=${BYTES}" >> "$GITHUB_OUTPUT"
          echo "diff_mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "- **diff_mode:** ${MODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **pr-diff.patch size (bytes):** ${BYTES}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${BYTES}" -gt 400000 ]; then
            echo "::notice::Truncating pr-diff.patch to 5000 lines for agent context."
            head -n 5000 pr-diff.patch > pr-diff-truncated.patch
            mv pr-diff-truncated.patch pr-diff.patch
            printf "\n\n... [diff truncated for CI]\n" >> pr-diff.patch
          fi
          wc -l pr-diff.patch pr-diff-stat.txt

      - name: Upload diff inputs (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: cursor-security-review-input
          path: |
            pr-diff.patch
            pr-diff-stat.txt
          retention-days: 14

      - name: Install Cursor CLI
        run: |
          set -euo pipefail
          curl https://cursor.com/install -fsS | bash
          for d in "$HOME/.local/bin" "$HOME/.cursor/bin"; do
            if [ -d "$d" ]; then
              echo "$d" >> "$GITHUB_PATH"
            fi
          done
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          command -v agent
          agent --version

      - name: Run Cursor agent — security review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_branch }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          ACTOR: ${{ github.event.pull_request.user.login || github.actor }}
          DIFF_MODE: ${{ steps.diff.outputs.diff_mode }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before || '' }}
          PUSH_AFTER: ${{ github.event.after || '' }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "::warning::CURSOR_API_KEY is not configured. Add it in repo Actions secrets to enable this job."
            exit 0
          fi

          if [ "${EVENT_NAME}" = "push" ]; then
            PR_LINE="Push to ${HEAD_REF} — diff uses this push's before/after SHAs (${PUSH_BEFORE} → ${PUSH_AFTER})"
          elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            PR_LINE="Manual workflow_dispatch — branch ${HEAD_REF} vs origin/${BASE_REF}"
          else
            PR_LINE="Pull request #${PR_NUMBER}: ${PR_TITLE}"
          fi

          agent --trust -p --output-format text \
            "You are performing an automated security-focused code review for a GitHub change.

            Context:
            - Repository: ${{ github.repository }}
            - ${PR_LINE}
            - Base branch: ${BASE_REF}  Head branch/ref: ${HEAD_REF}
            - Author/triggered by: ${ACTOR}
            - **diff_mode:** ${DIFF_MODE}
              (push_before_after = diff for this push only; pr_three_dot = PR vs merge-base; parent_to_head / single_commit_show = fallbacks; placeholder = last resort)

            In the workspace you have pr-diff.patch (unified diff) and pr-diff-stat.txt. Read them.
            If diff_mode is not pr_three_dot, state in your summary that you reviewed the **fallback patch** (last commit or placeholder), not the full PR delta vs base.

            Focus on: injection (SQL/OS/command), authn/authz mistakes, secret or credential leakage, unsafe deserialization, SSRF, path traversal, weak crypto, logging of sensitive data, CORS misconfiguration, and dependency-related risks visible in the diff.

            Output only (do not modify any files):
            1) Executive summary (2-5 sentences)
            2) Findings: severity (Critical/High/Medium/Low/Info), file path and brief location if inferable, issue, concrete remediation
            3) If nothing material: say so explicitly and note any residual assumptions.

            This is analysis only — do not apply patches or write to the repo."
